
<div id="erd" style="padding: 8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  SCHOOL {
    uuid id PK
    string name
    string knec_code
    string motto
    string county
    string sub_county
    string address
    string phone
    string email
    string logo_url
    string school_type
    timestamp created_at
  }

  ACADEMIC_YEAR {
    uuid id PK
    uuid school_id FK
    string label
    date start_date
    date end_date
    boolean is_current
  }

  TERM {
    uuid id PK
    uuid academic_year_id FK
    int term_number
    date start_date
    date end_date
    boolean is_current
  }

  GRADE_LEVEL {
    uuid id PK
    uuid school_id FK
    string name
    string cbc_level
    int sort_order
  }

  STREAM {
    uuid id PK
    uuid grade_level_id FK
    string name
    int capacity
  }

  SUBJECT {
    uuid id PK
    uuid school_id FK
    string name
    string code
    string cbc_learning_area
    string level_type
  }

  GRADE_SUBJECT {
    uuid id PK
    uuid grade_level_id FK
    uuid subject_id FK
    boolean is_examinable
    int periods_per_week
  }

  STUDENT {
    uuid id PK
    uuid school_id FK
    string admission_number
    string first_name
    string middle_name
    string last_name
    date date_of_birth
    string gender
    string nemis_id
    string photo_url
    date admission_date
    string status
  }

  STUDENT_ENROLLMENT {
    uuid id PK
    uuid student_id FK
    uuid stream_id FK
    uuid academic_year_id FK
    uuid term_id FK
    date enrollment_date
    string status
  }

  STAFF {
    uuid id PK
    uuid school_id FK
    string tsc_number
    string first_name
    string last_name
    string email
    string phone
    string role
    string department
    date join_date
    string status
  }

  CLASS_TEACHER {
    uuid id PK
    uuid staff_id FK
    uuid stream_id FK
    uuid academic_year_id FK
  }

  SUBJECT_TEACHER {
    uuid id PK
    uuid staff_id FK
    uuid grade_subject_id FK
    uuid stream_id FK
    uuid academic_year_id FK
  }

  PARENT_GUARDIAN {
    uuid id PK
    string first_name
    string last_name
    string id_number
    string phone
    string email
    string occupation
    string relationship
  }

  STUDENT_GUARDIAN {
    uuid id PK
    uuid student_id FK
    uuid guardian_id FK
    boolean is_primary
    boolean receives_reports
  }

  USER_ACCOUNT {
    uuid id PK
    uuid staff_id FK
    uuid guardian_id FK
    string email
    string password_hash
    string role
    boolean is_active
    timestamp last_login
  }

  SCHOOL ||--o{ ACADEMIC_YEAR : has
  ACADEMIC_YEAR ||--o{ TERM : contains
  SCHOOL ||--o{ GRADE_LEVEL : offers
  GRADE_LEVEL ||--o{ STREAM : has
  SCHOOL ||--o{ SUBJECT : defines
  GRADE_LEVEL ||--o{ GRADE_SUBJECT : includes
  SUBJECT ||--o{ GRADE_SUBJECT : assigned_in
  STUDENT ||--o{ STUDENT_ENROLLMENT : enrolled_via
  STREAM ||--o{ STUDENT_ENROLLMENT : placed_in
  ACADEMIC_YEAR ||--o{ STUDENT_ENROLLMENT : during
  SCHOOL ||--o{ STAFF : employs
  STAFF ||--o{ CLASS_TEACHER : assigned_as
  STREAM ||--o{ CLASS_TEACHER : managed_by
  STAFF ||--o{ SUBJECT_TEACHER : teaches_via
  GRADE_SUBJECT ||--o{ SUBJECT_TEACHER : taught_by
  STUDENT ||--o{ STUDENT_GUARDIAN : linked_to
  PARENT_GUARDIAN ||--o{ STUDENT_GUARDIAN : guardian_of
  STAFF ||--o| USER_ACCOUNT : has
  PARENT_GUARDIAN ||--o| USER_ACCOUNT : has
`;

const { svg } = await mermaid.render('erd-core-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</div>
